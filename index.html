<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracklist Vol.1</title>
<style>
:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;--s3:#1c1c1e;--s4:#2c2c2e;--s5:#3a3a3c;
  --w:#fff;--w80:rgba(255,255,255,0.8);--w55:rgba(255,255,255,0.55);
  --w30:rgba(255,255,255,0.3);--w12:rgba(255,255,255,0.12);
  --w06:rgba(255,255,255,0.06);--w03:rgba(255,255,255,0.03);
  --red:#ff3b30;
  --ease:cubic-bezier(0.4,0,0.2,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--w);overflow:hidden;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;}
::-webkit-scrollbar{width:0;}

.page{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateY(10px) scale(0.985);
  transition:opacity 0.36s var(--ease),transform 0.36s var(--ease);
  overflow-y:auto;
}
.page.active{opacity:1;pointer-events:all;transform:none;}
.page.out{opacity:0;transform:translateY(-8px) scale(1.01);}

/* PAGE ALBUM */
#page-album{
  align-items:center;justify-content:center;
  padding:0 32px 100px;gap:0;
}
.lbl{
  font-size:11px;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--w30);
  margin-bottom:32px;align-self:flex-start;padding-top:60px;
}
.album-card{width:min(252px,70vw);cursor:pointer;transition:transform 0.45s var(--spring);}
.album-card:hover{transform:translateY(-5px) scale(1.025);}
.album-card:active{transform:scale(0.97);}
.album-art{
  width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;
  position:relative;box-shadow:0 28px 56px rgba(0,0,0,0.85),0 0 0 0.5px var(--w12);
}
.album-art-bg{
  width:100%;height:100%;background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.grid-overlay{
  position:absolute;inset:0;
  background-image:linear-gradient(var(--w06) 1px,transparent 1px),linear-gradient(90deg,var(--w06) 1px,transparent 1px);
  background-size:26px 26px;
}
.vol-ghost{
  position:absolute;bottom:-10px;right:6px;
  font-size:86px;font-weight:800;letter-spacing:-6px;
  color:rgba(255,255,255,0.05);line-height:1;user-select:none;
}
.art-icon{font-size:68px;position:relative;z-index:1;}
.album-text{margin-top:18px;}
.album-text h2{font-size:18px;font-weight:600;letter-spacing:-0.2px;}
.album-text .sub{font-size:12px;color:var(--w30);margin-top:3px;}
.album-btns{display:flex;gap:9px;margin-top:20px;width:min(252px,70vw);}
.abtn{
  flex:1;height:42px;border-radius:11px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all 0.22s var(--spring);
}
.abtn-p{background:var(--w);color:#000;}
.abtn-p:hover{transform:scale(1.04);background:var(--w80);}
.abtn-p:active{transform:scale(0.96);}
.abtn-s{background:var(--s3);color:var(--w80);border:0.5px solid var(--w12);}
.abtn-s:hover{background:var(--s4);}
.abtn-s:active{transform:scale(0.96);}

/* PAGE TRACKLIST */
#page-tracklist{padding-bottom:80px;}
.tl-nav{padding:52px 20px 0;display:flex;align-items:center;}
.back{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--w);font-size:16px;font-weight:400;
  background:none;border:none;cursor:pointer;padding:8px 0;
  transition:opacity 0.2s;opacity:0.9;
}
.back:hover{opacity:0.5;}
.tl-hero{display:flex;align-items:flex-end;gap:14px;padding:16px 20px 18px;}
.tl-cov{width:76px;height:76px;border-radius:11px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.6);flex-shrink:0;}
.tl-cov-bg{width:100%;height:100%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:34px;}
.tl-meta h2{font-size:21px;font-weight:700;letter-spacing:-0.3px;}
.tl-meta .ta{font-size:13px;color:var(--w55);margin-top:3px;}
.tl-meta .tc{font-size:11px;color:var(--w30);margin-top:2px;}
.tl-acts{display:flex;gap:8px;padding:0 20px 20px;}
.tlb{
  height:34px;border-radius:9px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;padding:0 14px;
  transition:all 0.2s var(--spring);
}
.tlb-p{background:var(--w);color:#000;}
.tlb-p:hover{transform:scale(1.04);}
.tlb-s{background:var(--s3);color:var(--w80);border:0.5px solid var(--w12);}
.tlb-s:hover{background:var(--s4);}
.sep{height:0.5px;background:var(--w06);margin:0 20px;}
.tracks{padding:4px 8px;}
.track{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px;border-radius:9px;cursor:pointer;
  transition:background 0.15s;
}
.track:hover{background:var(--w03);}
.track:active{background:var(--w06);}
.t-num{width:20px;text-align:center;font-size:14px;color:var(--w30);font-variant-numeric:tabular-nums;flex-shrink:0;}
.t-eq{width:20px;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.track.now .t-eq{display:flex;}
.track.now .t-num{display:none;}
.bars{display:flex;align-items:flex-end;gap:2px;height:14px;}
.bar{width:2.5px;background:var(--w);border-radius:1.5px;animation:eq 0.7s ease-in-out infinite;}
.bar:nth-child(2){animation-delay:.18s;}.bar:nth-child(3){animation-delay:.36s;}
@keyframes eq{0%,100%{height:3px;}50%{height:12px;}}
.t-img{width:40px;height:40px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.t-img-bg{width:100%;height:100%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:17px;}
.t-info{flex:1;min-width:0;}
.t-title{font-size:15px;font-weight:400;color:var(--w80);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .3s;}
.track.now .t-title{color:var(--w);font-weight:500;}
.t-artist{font-size:11px;color:var(--w30);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-dur{font-size:11px;color:var(--w30);font-variant-numeric:tabular-nums;flex-shrink:0;}

/* PAGE PLAYER */
#page-player{align-items:center;padding:0 0 24px;touch-action:pan-y;overscroll-behavior:none;}
.p-handle{width:30px;height:4px;background:var(--s5);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.p-nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 20px 0;flex-shrink:0;}
.p-nav-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--s3);border:0.5px solid var(--w06);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--w);transition:all .2s var(--spring);
}
.p-nav-btn:hover{background:var(--s4);transform:scale(1.1);}
.p-nav-lbl{font-size:11px;color:var(--w30);font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
.p-cov-wrap{padding:22px 40px 18px;display:flex;justify-content:center;width:100%;flex-shrink:0;}
.p-cov{
  width:min(272px,70vw);aspect-ratio:1;border-radius:18px;overflow:hidden;
  box-shadow:0 28px 72px rgba(0,0,0,0.85),0 0 0 0.5px var(--w06);
  transition:transform .5s var(--spring),box-shadow .5s var(--ease);
}
.p-cov.on{transform:scale(1.04);box-shadow:0 40px 90px rgba(0,0,0,0.9),0 0 0 0.5px var(--w06);}
.p-cov-bg{width:100%;height:100%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:90px;transition:background .7s ease;}
.p-info{width:100%;padding:0 26px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.p-titles{flex:1;min-width:0;}
.p-title{font-size:21px;font-weight:700;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-artist{font-size:14px;color:var(--w55);margin-top:3px;}
.p-prog{padding:16px 26px 0;width:100%;flex-shrink:0;}
input[type=range].sl{
  width:100%;height:4px;-webkit-appearance:none;
  background:var(--s4);border-radius:2px;cursor:pointer;outline:none;
}
input[type=range].sl::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--w);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.5);transition:transform .2s var(--spring);
}
input[type=range].sl:hover::-webkit-slider-thumb{transform:scale(1.3);}
.p-times{display:flex;justify-content:space-between;margin-top:6px;}
.p-times span{font-size:11px;color:var(--w30);font-variant-numeric:tabular-nums;}
.p-ctrls{width:100%;padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cb{
  background:none;border:none;color:var(--w55);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--spring);border-radius:50%;padding:3px;
}
.cb:hover{color:var(--w);transform:scale(1.15);}
.cb:active{transform:scale(0.9);}
.cb.on{color:var(--w);}
.cb-main{
  width:62px;height:62px;border-radius:50%;
  background:var(--w);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.5);
  transition:all .24s var(--spring);
}
.cb-main svg{color:#000;}
.cb-main:hover{transform:scale(1.07);box-shadow:0 8px 28px rgba(0,0,0,.6);}
.cb-main:active{transform:scale(0.95);}
.p-vol{width:100%;padding:18px 26px 0;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.vic{color:var(--w30);display:flex;align-items:center;flex-shrink:0;}
input[type=range].vsl{
  flex:1;height:4px;-webkit-appearance:none;
  background:var(--s4);border-radius:2px;cursor:pointer;outline:none;
}
input[type=range].vsl::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--w);cursor:pointer;
}

/* MINI PLAYER — right side */
#mini{
  position:fixed;right:14px;top:50%;
  transform:translateY(-50%) scale(0.88);
  z-index:100;opacity:0;pointer-events:none;
  transition:opacity .4s var(--ease),transform .4s var(--spring);
  user-select:none;touch-action:none;
}
#mini.vis{opacity:1;pointer-events:all;transform:translateY(-50%) scale(1);}
#mini.dragging{transition:none !important;}
#mini.snap{transition:right .32s var(--spring),top .32s var(--spring) !important;}

@keyframes mini-breathe{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.032);}
}
@keyframes mini-bass{
  0%{transform:scale(1);}
  40%{transform:scale(1.07);}
  100%{transform:scale(1);}
}
@keyframes mini-glow-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(180,0,0,0),0 6px 36px rgba(0,0,0,.75);}
  50%{box-shadow:0 0 18px 4px rgba(200,0,0,0.35),0 6px 36px rgba(0,0,0,.75);}
}
@keyframes cover-spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
@keyframes vol-hint{
  0%,100%{opacity:0;transform:translateX(8px);}
  20%,80%{opacity:1;transform:translateX(0);}
}
.mini-wrap{
  width:52px;
  background:rgba(15,15,15,0.94);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:0.5px solid var(--w12);
  border-radius:17px;
  padding:9px 7px 9px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:0 6px 36px rgba(0,0,0,.75),0 1px 3px rgba(0,0,0,.5);
  cursor:pointer;
  transition:transform .28s var(--spring),box-shadow .28s var(--ease);
}
.mini-wrap:hover{transform:scale(1.07);box-shadow:0 10px 44px rgba(0,0,0,.85);}
.mini-img{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.mini-img-bg{
  width:100%;height:100%;background:var(--s3);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background .6s ease;
}
.mini-pp{
  width:26px;height:26px;background:none;border:none;
  cursor:pointer;color:var(--w80);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--spring);
}
.mini-pp:hover{transform:scale(1.22);}
.mini-pp:active{transform:scale(0.86);}
.mini-bar{width:100%;height:2px;background:var(--s5);border-radius:2px;overflow:hidden;}
.mini-fill{height:100%;background:var(--w80);border-radius:2px;transition:width .1s linear;width:0%;}

/* TOAST */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(26,26,28,0.96);
  border:0.5px solid var(--w12);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  color:var(--w80);padding:8px 16px;
  border-radius:100px;font-size:13px;font-weight:500;
  opacity:0;transition:all .32s var(--spring);
  z-index:200;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── UX ENHANCEMENTS ── */
#bg-dyn{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0;transition:opacity 1.4s ease,background 1.4s ease;
}
#bg-dyn.on{opacity:1;}

.p-cov-glow{
  position:absolute;inset:-20px;
  border-radius:28px;
  filter:blur(40px);
  opacity:0;
  transition:opacity .8s ease,background .8s ease;
  z-index:-1;pointer-events:none;
}
.p-cov-wrap{position:relative;}

@keyframes pulse-ring{
  0%{transform:scale(1);opacity:.35;}
  70%{transform:scale(1.18);opacity:0;}
  100%{transform:scale(1.18);opacity:0;}
}
.cb-main.playing::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  animation:pulse-ring 1.8s ease-out infinite;
}
.cb-main{position:relative;}

@keyframes ripple{
  0%{transform:scale(0);opacity:.4;}
  100%{transform:scale(2.5);opacity:0;}
}
.ripple-el{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.25);
  width:60px;height:60px;
  margin:-30px;pointer-events:none;
  animation:ripple .5s ease-out forwards;
}

.cb-main:active,.abtn:active,.tlb:active,.p-nav-btn:active{
  transform:scale(0.93)!important;
}



.track{transition:background .15s, transform .15s var(--spring);}
.track:active{transform:scale(0.98)!important;}

.mini-wrap{transition:transform .28s var(--spring),box-shadow .28s var(--ease),opacity .2s;}
.mini-wrap:active{transform:scale(0.94)!important;}

/* ── IMMERSIVE BACKGROUND ── */
#bg-dyn{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0;transition:opacity 1.8s ease;
  overflow:hidden;
}
#bg-dyn.on{opacity:1;}

#bg-canvas{
  position:absolute;inset:-20%;
  width:140%;height:140%;
  filter:blur(0px);
  transition:filter 1s ease;
}

body.paused #bg-canvas{filter:blur(4px) brightness(0.5);}
body.paused .page{filter:brightness(0.75);transition:filter 1s ease;}
body.playing .page{filter:brightness(1);transition:filter 0.8s ease;}

/* ── GLOW COVER ── */
.p-cov-glow{
  position:absolute;
  inset:-30px;
  border-radius:28px;
  opacity:0;
  transition:opacity 1.2s ease, background 1.2s ease;
  z-index:-1;pointer-events:none;
  filter:blur(30px);
}
.p-cov-wrap{position:relative;}

/* ── TILT 3D ── */
#page-player .p-cov{
  transition:transform 0.12s ease, box-shadow 0.5s var(--spring);
  will-change:transform;
}

/* ── BREATHING ── */
@keyframes breathe{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.008);}
}
body.playing #page-player.active .p-cov-wrap{
  animation:breathe 4s ease-in-out infinite;
}
body.paused #page-player.active .p-cov-wrap{
  animation:none;
}

/* ── PULSE RING (play btn) ── */
@keyframes pulse-ring{
  0%{transform:scale(1);opacity:0.3;}
  100%{transform:scale(1.5);opacity:0;}
}
.cb-main.playing::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.4);
  animation:pulse-ring 2s ease-out infinite;
}
.cb-main{position:relative;}

/* ── BASS PULSE ── */
@keyframes bass{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.012);}
}
.bass-pulse{animation:bass 0.3s ease-in-out;}
</style>
</head>
<body>

<div id="bg-dyn"><canvas id="bg-canvas"></canvas></div>
<div id="toast"></div>

<!-- MINI PLAYER (right) -->
<div id="mini">
  <div class="mini-vol-hint" id="mini-vol-hint">🔊 80%</div>
  <div class="mini-wrap" id="mini-wrap">
    <div class="mini-glow"></div>
    <div class="mini-img"><img id="mini-art" /></div>
    <div class="mini-eq">
      <div class="mini-eq-bar" style="height:4px"></div>
      <div class="mini-eq-bar" style="height:7px"></div>
      <div class="mini-eq-bar" style="height:4px"></div>
    </div>
    <button class="mini-pp" id="mini-pp">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="mini-bar"><div class="mini-fill" id="mini-fill"></div></div>
    <div class="mini-hidden" id="mini-hidden">
      <button class="mini-hidden-btn" id="mini-like-btn" title="Like">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
      <button class="mini-hidden-btn" id="mini-shuf-btn" title="Shuffle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- PAGE ALBUM -->
<div id="page-album" class="page active">
  <div class="lbl">Bibliothèque</div>
  <div class="album-card" onclick="goTo('tracklist')">
    <div class="album-art">
      <div class="album-art-bg">
        <img id="album-cover-img" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" />
      </div>
    </div>
    <div class="album-text">
      <h2>Tracklist Vol.1</h2>
      <div class="sub">Tracklist Vol.1 &nbsp;·&nbsp; 2024 &nbsp;·&nbsp; 3 titres</div>
    </div>
  </div>
  <div class="album-btns">
    <button class="abtn abtn-p" onclick="playAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Écouter
    </button>
    <button class="abtn abtn-s" onclick="goTo('tracklist')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/></svg>
      Titres
    </button>
  </div>
</div>

<!-- PAGE TRACKLIST -->
<div id="page-tracklist" class="page">
  <div class="tl-nav">
    <button class="back" onclick="goTo('album')">
      <svg width="9" height="14" viewBox="0 0 9 14" fill="none"><path d="M8 1L2 7L8 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      &nbsp;Retour
    </button>
  </div>
  <div class="tl-hero">
    <div class="tl-cov"><img id="tl-cover-img" style="width:100%;height:100%;object-fit:cover;" /></div>
    <div class="tl-meta">
      <h2>Tracklist Vol.1</h2>
      <div class="ta">Mixed Artists</div>
      <div class="tc">3 titres</div>
    </div>
  </div>

const T=[
  {title:"Track 1", artist:"Tracklist Vol.1", file:"music/track1.wav", cover:null, bg:"#0a0000"},
  {title:"Track 2", artist:"Tracklist Vol.1", file:"music/track2.wav", cover:null, bg:"#0a0000"},
  {title:"Track 3", artist:"Tracklist Vol.1", file:"music/track3.wav", cover:null, bg:"#0a0000"},
];

let idx=parseInt(localStorage.getItem('idx')||'0');
let playing=false,shuf=false,rep=false;
let liked=new Set(JSON.parse(localStorage.getItem('liked')||'[]'));
let pg='album';
let fadeTimer=null;
const audio=new Audio();

// ── Restore volume & position ──
const savedVol=parseFloat(localStorage.getItem('vol')||'0.8');
audio.volume=savedVol;


function load(i, andPlay){
  const t=T[i]; if(!t) return;
  idx=i;
  localStorage.setItem('idx', i);
  localStorage.removeItem('pos');
  // stop current audio cleanly
  audio.pause();
  audio.src='';
  audio.currentTime=0;
  refresh();
  if(andPlay){
    audio.src=t.file;
    audio.volume=savedVol;
    audio.play()
      .then(()=>{ playing=true; uiPlay(); })
      .catch(()=>{ playing=false; uiPlay(); toast('⚠️ '+t.file+' introuvable'); });
  }
}

function go(){
  audio.play()
    .then(()=>{ playing=true; uiPlay(); })
    .catch(()=>{ playing=false; uiPlay(); toast('⚠️ '+T[idx].file+' introuvable'); });
}

function togglePlay(){
  if(playing){audio.pause();playing=false;uiPlay();}
  else{go();}
}
function miniTgl(e){e.stopPropagation();togglePlay();}
function miniNext(e){e.stopPropagation();nextTrack();}
function miniPrev(e){e.stopPropagation();prevTrack();}
function nextTrack(anim){
  load(shuf?rnd():(idx+1)%T.length,true);
}
function prevTrack(){
  if(audio.currentTime>3){audio.currentTime=0;return;}
  load((idx-1+T.length)%T.length,true);
}
function rnd(){let n;do{n=Math.floor(Math.random()*T.length);}while(n===idx&&T.length>1);return n;}
function playAll(){load(0,true);goTo('player');}
function shuffleAll(){shuf=true;load(rnd(),true);goTo('player');}
function toggleShuffle(){shuf=!shuf;document.getElementById('btn-shuf').classList.toggle('on',shuf);toast(shuf?'🔀 Aléatoire activé':'🔀 Désactivé');}
function toggleRepeat(){rep=!rep;audio.loop=rep;document.getElementById('btn-rep').classList.toggle('on',rep);toast(rep?'🔁 Répétition activée':'🔁 Désactivée');}
function toggleLike(){
  liked.has(idx)?liked.delete(idx):(liked.add(idx),toast('♥ Ajouté aux favoris'));
  localStorage.setItem('liked',JSON.stringify([...liked]));
  document.getElementById('p-heart').style.color=liked.has(idx)?'var(--red)':'var(--w30)';
}
function openPlayer(){goTo('player');}

// ── LIQUID BACKGROUND ENGINE ──
const TRACK_COLORS=[
  ['#3a0000','#1a0000','#2a0000'],
  ['#2a0000','#1a0000','#3a0000'],
  ['#3a0000','#2a0000','#1a0000'],
];

let liquidAnim=null;
let liquidCtx=null;
let liquidBlobs=[];
let liquidColors=TRACK_COLORS[0];
let targetColors=TRACK_COLORS[0];
let colorLerp=0;

function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return[r,g,b];
}
function lerpColor(a,b,t){
  const ra=hexToRgb(a),rb=hexToRgb(b);
  return `rgb(${Math.round(ra[0]+(rb[0]-ra[0])*t)},${Math.round(ra[1]+(rb[1]-ra[1])*t)},${Math.round(ra[2]+(rb[2]-ra[2])*t)})`;
}

function initLiquid(){
  const canvas=document.getElementById('bg-canvas');
  if(!canvas)return;
  liquidCtx=canvas.getContext('2d');
  function resize(){
    canvas.width=window.innerWidth*1.4;
    canvas.height=window.innerHeight*1.4;
    initBlobs();
  }
  window.addEventListener('resize',resize);
  resize();
  // create blobs
  function initBlobs(){
    liquidBlobs=Array.from({length:5},(_,i)=>({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4,
      r:canvas.width*0.38+Math.random()*canvas.width*0.2,
      phase:Math.random()*Math.PI*2,
      speed:0.003+Math.random()*0.004,
    }));
  }
  animateLiquid();
}

let breatheScale=1;
let bassIntensity=0;

function animateLiquid(){
  liquidAnim=requestAnimationFrame(animateLiquid);
  const canvas=document.getElementById('bg-canvas');
  if(!canvas||!liquidCtx)return;
  const W=canvas.width,H=canvas.height;
  liquidCtx.clearRect(0,0,W,H);
  liquidCtx.fillStyle='#000';
  liquidCtx.fillRect(0,0,W,H);

  // lerp colors
  colorLerp=Math.min(1,colorLerp+0.004);
  liquidColors=liquidColors; // keep ref for lerp

  const t=performance.now()/1000;
  liquidBlobs.forEach((b,i)=>{
    b.x+=b.vx*(1+bassIntensity*3);
    b.y+=b.vy*(1+bassIntensity*3);
    if(b.x<-b.r)b.x=W+b.r;
    if(b.x>W+b.r)b.x=-b.r;
    if(b.y<-b.r)b.y=H+b.r;
    if(b.y>H+b.r)b.y=-b.r;

    // bass bounce: blobs expand sharply on hit
    const bassBounce=1+bassIntensity*(1.2+i*0.15);
    const breathe=1+Math.sin(t*b.speed*60+b.phase)*0.05;
    const r=b.r*breathe*bassBounce;

    // brightness increases with bass
    const alpha=Math.min(0.75, 0.45+bassIntensity*0.5);
    const ci=i%targetColors.length;
    const c=lerpColor(liquidColors[ci]||'#000',targetColors[ci],colorLerp);

    const grd=liquidCtx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
    grd.addColorStop(0,c.replace('rgb','rgba').replace(')',','+alpha+')'));
    grd.addColorStop(0.4,c.replace('rgb','rgba').replace(')',','+(alpha*0.4)+')'));
    grd.addColorStop(1,'rgba(0,0,0,0)');
    liquidCtx.globalCompositeOperation='screen';
    liquidCtx.fillStyle=grd;
    liquidCtx.beginPath();
    liquidCtx.arc(b.x,b.y,r,0,Math.PI*2);
    liquidCtx.fill();
  });

  // dark overlay
  liquidCtx.globalCompositeOperation='source-over';
  const ov=liquidCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.8);
  ov.addColorStop(0,'rgba(0,0,0,0)');
  ov.addColorStop(1,'rgba(0,0,0,0.7)');
  liquidCtx.fillStyle=ov;
  liquidCtx.fillRect(0,0,W,H);

  bassIntensity*=0.78;
}

function updateDynBg(){
  const colors=TRACK_COLORS[idx%TRACK_COLORS.length];
  liquidColors=targetColors.slice();
  targetColors=colors;
  colorLerp=0;
  document.getElementById('bg-dyn').classList.add('on');
  const glow=document.getElementById('p-glow');
  if(glow){
    glow.style.background=colors[0];

}

function refresh(){

  document.querySelectorAll('.track').forEach((el,i)=>el.classList.toggle('now',i===idx));

}

function uiPlay(){
  const on=playing;
  document.getElementById('play-ico').innerHTML=on?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
  document.querySelector('#mini-pp svg').innerHTML=on?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
  document.getElementById('p-cov').classList.toggle('on',on);
  document.getElementById('btn-play').classList.toggle('playing',on);
  document.querySelectorAll('.track.now .bar').forEach(b=>b.style.animationPlayState=on?'running':'paused');
  document.body.classList.toggle('playing',on);
  document.body.classList.toggle('paused',!on);
  const mw=document.getElementById('mini-wrap');
  if(mw){mw.classList.toggle('playing',on);mw.classList.toggle('paused',!on);}
}

// ── Progress ──
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const p=(audio.currentTime/audio.duration)*100;
  document.getElementById('p-range').value=p;
  document.getElementById('mini-fill').style.width=p+'%';
  document.getElementById('t-cur').textContent=fmt(audio.currentTime);
  // save position every 5s
  if(Math.round(audio.currentTime)%5===0) localStorage.setItem('pos',audio.currentTime);
});
audio.addEventListener('loadedmetadata',()=>{
  document.getElementById('t-tot').textContent=fmt(audio.duration);
  // only restore if same track and not a new load
  const savedIdx=parseInt(localStorage.getItem('idx')||'0');
  const pos=parseFloat(localStorage.getItem('pos')||'0');
  if(pos>0 && idx===savedIdx && !audio._newTrack) audio.currentTime=pos;
  audio._newTrack=false;
});
audio.addEventListener('ended',()=>{if(!rep)nextTrack(true);});
document.getElementById('p-range').addEventListener('input',e=>{
  if(audio.duration){audio.currentTime=(e.target.value/100)*audio.duration;localStorage.setItem('pos',audio.currentTime);}
});
document.getElementById('vol').addEventListener('input',e=>{
  audio.volume=e.target.value/100;
  localStorage.setItem('vol',e.target.value/100);
});

function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc;}

// ── Navigation ──
function goTo(p){
  if(p===pg)return;
  const prev=document.getElementById('page-'+pg);
  const next=document.getElementById('page-'+p);
  prev.classList.add('out');
  setTimeout(()=>{prev.classList.remove('active','out');next.classList.add('active');},200);
  document.getElementById('mini').classList.toggle('vis',p!=='player');
  pg=p;
}



// ── Double click cover = next track ──
function initCoverDblClick(){
  document.getElementById('p-cov').addEventListener('dblclick',()=>{
    nextTrack();
    // flash feedback
    const c=document.getElementById('p-cov');
    c.style.transition='opacity .12s';
    c.style.opacity='0.6';
    setTimeout(()=>{c.style.opacity='1';setTimeout(()=>c.style.transition='',200);},120);

}

// ── Ripple on play button ──
function addRipple(btn){
  btn.addEventListener('click',e=>{
    const r=document.createElement('span');
    r.className='ripple-el';
    r.style.left=e.offsetX+'px';
    r.style.top=e.offsetY+'px';
    btn.appendChild(r);
    setTimeout(()=>r.remove(),500);
  });
}

// ── Keyboard controls ──
function initKeyboard(){
  document.addEventListener('keydown',e=>{
    const tag=document.activeElement.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA') return;
    if(e.code==='Space'){e.preventDefault();togglePlay();}
    if(e.code==='ArrowRight'){e.preventDefault();nextTrack(true);}
    if(e.code==='ArrowLeft'){e.preventDefault();prevTrack();}
    if(e.code==='ArrowUp'){e.preventDefault();audio.volume=Math.min(1,audio.volume+.1);document.getElementById('vol').value=audio.volume*100;}
    if(e.code==='ArrowDown'){e.preventDefault();audio.volume=Math.max(0,audio.volume-.1);document.getElementById('vol').value=audio.volume*100;}
    if(e.code==='KeyL'){toggleLike();}
  });
}

// ── Build tracklist ──
function buildTracks(){
  const c=document.getElementById('tracks');c.innerHTML='';
  T.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='track'+(i===idx?' now':'');
    d.innerHTML=`
      <div class="t-num">${i+1}</div>
      <div class="t-eq"><div class="bars">
        <div class="bar" style="animation-play-state:${playing&&i===idx?'running':'paused'}"></div>
        <div class="bar" style="animation-play-state:${playing&&i===idx?'running':'paused'}"></div>
        <div class="bar" style="animation-play-state:${playing&&i===idx?'running':'paused'}"></div>
      </div></div>
      <div class="t-img"><img src="${COVER_IMG}" style="width:100%;height:100%;object-fit:cover;border-radius:7px;" /></div>
      <div class="t-info"><div class="t-title">${t.title}</div><div class="t-artist">${t.artist}</div></div>
      <div class="t-dur" id="dur${i}">–:––</div>`;
    d.onclick=()=>{load(i,true);goTo('player');};
    c.appendChild(d);
  });
  T.forEach((t,i)=>{
    const a=new Audio();a.src=t.file;
    a.addEventListener('loadedmetadata',()=>{const el=document.getElementById('dur'+i);if(el)el.textContent=fmt(a.duration);});
  });
}

let tt;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('on'),2000);}

// ── TILT 3D on mouse move ──
function initTilt(){
  const player=document.getElementById('page-player');
  let tiltActive=false;
  document.addEventListener('mousemove',e=>{
    if(pg!=='player')return;
    const cx=window.innerWidth/2,cy=window.innerHeight/2;
    const dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy;
    const cover=document.getElementById('p-cov');
    if(cover){
      cover.style.transform=`perspective(900px) rotateY(${dx*4}deg) rotateX(${-dy*3}deg) scale(${playing?1.04:1})`;
    }

  document.addEventListener('mouseleave',()=>{
    const cover=document.getElementById('p-cov');
    if(cover) cover.style.transform=playing?'scale(1.04)':'scale(1)';
  });
}

// ── AUDIO ANALYZER for bass pulse ──
let analyzerNode=null,analyzerData=null,audioCtx=null;
function initAudioAnalyzer(){
  audio.addEventListener('play',()=>{
    if(audioCtx) return;
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const src=audioCtx.createMediaElementSource(audio);
      analyzerNode=audioCtx.createAnalyser();
      analyzerNode.fftSize=256;
      analyzerData=new Uint8Array(analyzerNode.frequencyBinCount);
      src.connect(analyzerNode);
      analyzerNode.connect(audioCtx.destination);
      tickAnalyzer();
    }catch(e){}
  },{once:true});
}

function tickAnalyzer(){
  requestAnimationFrame(tickAnalyzer);
  if(!analyzerNode||!playing)return;
  analyzerNode.getByteFrequencyData(analyzerData);
  // bass = first 4 bins avg
  let bass=0;
  for(let i=0;i<4;i++) bass+=analyzerData[i];
  bass=bass/(4*255);
  if(bass>0.35){
    const newBass=Math.min(1,(bass-0.35)*2.5);
    if(newBass>bassIntensity+0.2){
      // strong hit - bounce mini player
      const mw=document.getElementById('mini-wrap');
      if(mw&&playing){
        mw.classList.remove('bass-hit');
        void mw.offsetWidth;
        mw.classList.add('bass-hit');
        setTimeout(()=>mw.classList.remove('bass-hit'),260);
      }
    }
    bassIntensity=Math.max(bassIntensity,newBass);
  }
}

// ── Mini player interactions ──
function initMini(){
  const wrap=document.getElementById('mini-wrap');
  const pp=document.getElementById('mini-pp');
  const likeBtn=document.getElementById('mini-like-btn');
  const shufBtn=document.getElementById('mini-shuf-btn');
  if(!wrap)return;

  let tapTimer=null,tapCount=0,longTimer=null;
  let volDrag=false,volStartY=0,volStartVal=0;

  // tap / double-tap / long-press on wrap
  wrap.addEventListener('touchstart',e=>{
    if(e.target===pp||e.target.closest('.mini-pp')||
       e.target===likeBtn||e.target===shufBtn||
       e.target.closest('.mini-hidden-btn')) return;
    longTimer=setTimeout(()=>{longTimer=null;openPlayer();},500);
    volDrag=false;volStartY=e.touches[0].clientY;volStartVal=audio.volume;
  },{passive:true});

  wrap.addEventListener('touchmove',e=>{
    clearTimeout(longTimer);longTimer=null;
    const dy=volStartY-e.touches[0].clientY;
    if(Math.abs(dy)>10){
      volDrag=true;
      const newVol=Math.max(0,Math.min(1,volStartVal+dy/120));
      audio.volume=newVol;
      document.getElementById('vol').value=newVol*100;
      localStorage.setItem('vol',newVol);
      const hint=document.getElementById('mini-vol-hint');
      if(hint){hint.textContent='🔊 '+Math.round(newVol*100)+'%';hint.classList.add('show');}
    }
  },{passive:true});

  wrap.addEventListener('touchend',e=>{
    clearTimeout(longTimer);longTimer=null;
    const hint=document.getElementById('mini-vol-hint');
    if(hint) setTimeout(()=>hint.classList.remove('show'),800);
    if(volDrag){volDrag=false;return;}
    if(e.target===pp||e.target.closest('.mini-pp')) return;
    // tap count for double tap = skip
    tapCount++;
    if(tapTimer) clearTimeout(tapTimer);
    tapTimer=setTimeout(()=>{
      if(tapCount===1) togglePlay();
      else if(tapCount>=2) nextTrack();
      tapCount=0;
    },220);
  },{passive:true});

  // swipe left/right on mini = change track
  let sx=0;
  wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  wrap.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>30){dx<0?nextTrack():prevTrack();}
  },{passive:true});

  // mouse: click play/pause, no drag conflict
  pp.addEventListener('click',e=>{e.stopPropagation();togglePlay();});

  // like / shuffle buttons
  if(likeBtn) likeBtn.addEventListener('click',e=>{
    e.stopPropagation();
    liked.has(idx)?liked.delete(idx):(liked.add(idx),toast('♥ Ajouté'));
    localStorage.setItem('liked',JSON.stringify([...liked]));
    likeBtn.classList.toggle('on',liked.has(idx));
    document.getElementById('p-heart').style.color=liked.has(idx)?'var(--red)':'var(--w30)';
  });
  if(shufBtn) shufBtn.addEventListener('click',e=>{
    e.stopPropagation();toggleShuffle();
    shufBtn.classList.toggle('on',shuf);
  });
}

// ── Drag mini player ──
function initDrag(){
  const el=document.getElementById('mini');
  const EW=66,EH=130,MARGIN=14;
  const W=()=>window.innerWidth,H=()=>window.innerHeight;

  const saved=JSON.parse(localStorage.getItem('miniPos')||'null');
  if(saved){
    el.style.right='auto';
    el.style.top=saved.top+'px';
    el.style.left=saved.side==='left'?(MARGIN+'px'):'auto';
    el.style.right=saved.side==='right'?(MARGIN+'px'):'auto';
  }

  let startX,startY,startElX,startElY,dragged=false;

  function getElPos(){const r=el.getBoundingClientRect();return{x:r.left,y:r.top};}

  function onStart(cx,cy){
    dragged=false;
    const pos=getElPos();
    startX=cx;startY=cy;startElX=pos.x;startElY=pos.y;
    el.style.transition='none';
    el.style.right='auto';
    el.style.left=startElX+'px';
    el.style.top=startElY+'px';
    el.style.transform='scale(1)';
    el.classList.add('dragging');el.classList.remove('snap');
  }

  function onMove(cx,cy){
    const dx=cx-startX,dy=cy-startY;
    if(Math.abs(dx)>4||Math.abs(dy)>4) dragged=true;
    if(!dragged) return;
    let newY=startElY+dy;
    newY=Math.max(MARGIN,Math.min(H()-EH-MARGIN,newY));
    el.style.left=(startElX+dx)+'px';
    el.style.top=newY+'px';
  }

  function onEnd(){
    el.classList.remove('dragging');el.classList.add('snap');
    const pos=getElPos();
    const midX=pos.x+EW/2;
    const side=midX<W()/2?'left':'right';
    el.style.left=side==='left'?(MARGIN+'px'):'auto';
    el.style.right=side==='right'?(MARGIN+'px'):'auto';
    const topVal=parseFloat(el.style.top)||H()/2-EH/2;
    localStorage.setItem('miniPos',JSON.stringify({side,top:topVal}));
    setTimeout(()=>el.classList.remove('snap'),400);
    return !dragged;
  }

  el.addEventListener('mousedown',e=>{
    if(e.target.closest('.mini-pp')) return;
    e.preventDefault();onStart(e.clientX,e.clientY);
    function mm(e){onMove(e.clientX,e.clientY);}
    function mu(e){
      document.removeEventListener('mousemove',mm);
      document.removeEventListener('mouseup',mu);
      if(onEnd()) openPlayer();
    }
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.mini-pp')) return;
    const t=e.touches[0];onStart(t.clientX,t.clientY);
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    const t=e.touches[0];onMove(t.clientX,t.clientY);
    if(dragged) e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',e=>{if(onEnd()) openPlayer();});
}
